name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.2.0). Defaults to the ref if on a tag."
        required: false

permissions:
  contents: write # required for creating GitHub releases
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          # workflow_dispatch from tag-release passes the tag as the ref;
          # manual triggers can also pass it as an input.
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" != v* ]]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          if [[ -z "$TAG" || "$TAG" != v* ]]; then
            echo "::error::Could not determine tag. GITHUB_REF_NAME=${GITHUB_REF_NAME}, inputs.tag=${{ github.event.inputs.tag }}"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - uses: pnpm/action-setup@v4

      # NOTE: do NOT set `registry-url` here. It writes an .npmrc with
      # `_authToken=${NODE_AUTH_TOKEN}`, which makes npm use token auth and
      # skip OIDC trusted publishing entirely. npm publishes to the default
      # registry (registry.npmjs.org) without it.
      # Node 24 ships with npm 11.x+ which supports OIDC trusted publishing.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # pnpm publish does not yet support OIDC trusted publishing (see
      # pnpm/pnpm#9812), so we shell out to npm for the upload step.

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      - name: Publish @dangayle/applepi
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view @dangayle/applepi@$VERSION version >/dev/null 2>&1; then
            echo "@dangayle/applepi@$VERSION already published, skipping"
          else
            npm publish --access public --provenance
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
